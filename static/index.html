<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenRAG - Document Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: { 800: '#1e1e2e', 900: '#11111b', 700: '#313244' },
            accent: { 500: '#6c63ff', 600: '#5b54e0' }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .score-bar { transition: width 0.5s ease; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e1e2e; }
    ::-webkit-scrollbar-thumb { background: #6c63ff; border-radius: 3px; }
  </style>
</head>
<body class="bg-dark-900 text-gray-100 min-h-screen" x-data="app()">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-dark-900/80 backdrop-blur-md border-b border-white/5">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent-500 to-blue-500 flex items-center justify-center text-sm font-bold">R</div>
        <h1 class="text-lg font-semibold">OpenRAG</h1>
        <span class="text-xs text-gray-500">Document Search</span>
      </div>
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full" :class="healthy ? 'bg-emerald-400' : 'bg-red-400'"></div>
        <span class="text-xs text-gray-400" x-text="healthy ? 'Connected' : 'Disconnected'"></span>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">

    <!-- Tabs -->
    <div class="flex gap-1 mb-6 bg-dark-800 rounded-lg p-1 w-fit">
      <template x-for="t in ['search', 'upload', 'documents', 'collections']">
        <button @click="tab = t"
          class="px-4 py-2 rounded-md text-sm font-medium transition-all capitalize"
          :class="tab === t ? 'bg-accent-500 text-white shadow-lg shadow-accent-500/20' : 'text-gray-400 hover:text-white'">
          <span x-text="t === 'search' ? '&#x1F50D; Search' : t === 'upload' ? '&#x1F4C4; Upload' : t === 'documents' ? '&#x1F4DA; Documents' : '&#x1F4C2; Collections'"></span>
        </button>
      </template>
    </div>

    <!-- ===== SEARCH TAB ===== -->
    <div x-show="tab === 'search'" x-cloak class="fade-in">
      <div class="bg-dark-800 rounded-xl border border-white/5 p-6">
        <form @submit.prevent="search()" class="flex gap-3">
          <input type="text" x-model="query" placeholder="Search documents..."
            class="flex-1 bg-dark-700 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-accent-500 focus:ring-1 focus:ring-accent-500" />
          <select x-model="searchCollection"
            class="bg-dark-700 border border-white/10 rounded-lg px-3 py-3 text-gray-300 focus:outline-none focus:border-accent-500">
            <template x-for="c in collectionList">
              <option :value="c.name" x-text="c.name"></option>
            </template>
          </select>
          <input type="number" x-model.number="topK" min="1" max="20"
            class="w-20 bg-dark-700 border border-white/10 rounded-lg px-3 py-3 text-gray-300 focus:outline-none focus:border-accent-500"
            title="Top K results" />
          <button type="submit" :disabled="searching || !query.trim()"
            class="bg-accent-500 hover:bg-accent-600 disabled:opacity-40 text-white px-6 py-3 rounded-lg font-medium transition-colors">
            <span x-show="!searching">Search</span>
            <span x-show="searching">Searching...</span>
          </button>
        </form>
      </div>

      <!-- Search Results -->
      <div x-show="searchResults.length > 0" class="mt-4 space-y-3">
        <p class="text-sm text-gray-400">
          Found <span class="text-white font-medium" x-text="searchResults.length"></span> results
        </p>
        <template x-for="(r, idx) in searchResults" :key="idx">
          <div class="bg-dark-800 rounded-xl border border-white/5 p-5 fade-in">
            <div class="flex items-center justify-between mb-3">
              <span class="text-sm text-accent-500 font-medium" x-text="r.metadata.filename || 'Unknown'"></span>
              <span class="text-xs px-2 py-1 rounded-full"
                :class="r.score > 0.5 ? 'bg-emerald-500/20 text-emerald-400' : r.score > 0.3 ? 'bg-yellow-500/20 text-yellow-400' : 'bg-red-500/20 text-red-400'">
                Score: <span x-text="r.score.toFixed(4)"></span>
              </span>
            </div>
            <div class="w-full bg-dark-700 rounded-full h-1.5 mb-3">
              <div class="bg-gradient-to-r from-accent-500 to-blue-500 h-1.5 rounded-full score-bar" :style="'width:' + (r.score * 100) + '%'"></div>
            </div>
            <p class="text-gray-300 text-sm leading-relaxed whitespace-pre-wrap" x-text="r.text"></p>
            <div class="mt-3 flex gap-3 text-xs text-gray-500">
              <span x-show="r.metadata.section">Section: <span class="text-gray-400" x-text="r.metadata.section"></span></span>
              <span>Chunk #<span x-text="r.metadata.chunk_index"></span></span>
            </div>
          </div>
        </template>
      </div>

      <div x-show="searchDone && searchResults.length === 0" class="mt-4 text-center py-12 text-gray-500">
        No results found.
      </div>
    </div>

    <!-- ===== UPLOAD TAB ===== -->
    <div x-show="tab === 'upload'" x-cloak class="fade-in">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <!-- File Upload -->
        <div class="bg-dark-800 rounded-xl border border-white/5 p-6">
          <h3 class="text-base font-semibold mb-4">Upload File</h3>
          <div class="border-2 border-dashed border-white/10 rounded-lg p-8 text-center hover:border-accent-500/50 transition-colors"
            @dragover.prevent="dragOver = true" @dragleave="dragOver = false"
            @drop.prevent="dragOver = false; handleFileDrop($event)"
            :class="dragOver ? 'border-accent-500 bg-accent-500/5' : ''">
            <input type="file" id="fileInput" class="hidden" @change="handleFileSelect($event)" multiple />
            <label for="fileInput" class="cursor-pointer">
              <div class="text-4xl mb-3">&#x1F4C1;</div>
              <p class="text-gray-400">Drag & drop files or <span class="text-accent-500 underline">browse</span></p>
              <p class="text-xs text-gray-600 mt-1">PDF, DOCX, TXT, MD, HTML, PPTX, XLSX...</p>
            </label>
          </div>
          <div class="mt-3">
            <label class="text-sm text-gray-400">Collection</label>
            <input type="text" x-model="uploadCollection"
              class="w-full mt-1 bg-dark-700 border border-white/10 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-accent-500" />
          </div>
          <div x-show="uploadQueue.length > 0" class="mt-4 space-y-2">
            <template x-for="(f, i) in uploadQueue" :key="i">
              <div class="flex items-center justify-between bg-dark-700 rounded-lg px-3 py-2">
                <span class="text-sm text-gray-300 truncate" x-text="f.name"></span>
                <span class="text-xs"
                  :class="f.status === 'done' ? 'text-emerald-400' : f.status === 'uploading' ? 'text-yellow-400' : f.status === 'error' ? 'text-red-400' : 'text-gray-500'"
                  x-text="f.status === 'done' ? f.chunks + ' chunks' : f.status"></span>
              </div>
            </template>
          </div>
          <button @click="uploadFiles()" :disabled="uploadQueue.length === 0 || uploading"
            class="mt-4 w-full bg-accent-500 hover:bg-accent-600 disabled:opacity-40 text-white py-2.5 rounded-lg font-medium transition-colors">
            <span x-show="!uploading">Upload & Index</span>
            <span x-show="uploading">Uploading... (<span x-text="uploadProgress"></span>/<span x-text="uploadQueue.length"></span>)</span>
          </button>
        </div>

        <!-- Text Input -->
        <div class="bg-dark-800 rounded-xl border border-white/5 p-6">
          <h3 class="text-base font-semibold mb-4">Index Text</h3>
          <input type="text" x-model="textTitle" placeholder="Title"
            class="w-full bg-dark-700 border border-white/10 rounded-lg px-3 py-2 text-white mb-3 focus:outline-none focus:border-accent-500" />
          <textarea x-model="textContent" rows="10" placeholder="Paste text or markdown content..."
            class="w-full bg-dark-700 border border-white/10 rounded-lg px-3 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-accent-500 resize-none"></textarea>
          <button @click="indexText()" :disabled="!textContent.trim() || indexingText"
            class="mt-3 w-full bg-accent-500 hover:bg-accent-600 disabled:opacity-40 text-white py-2.5 rounded-lg font-medium transition-colors">
            <span x-show="!indexingText">Index Text</span>
            <span x-show="indexingText">Indexing...</span>
          </button>
          <div x-show="textResult" class="mt-3 p-3 rounded-lg text-sm" :class="textResultOk ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-400'" x-text="textResult"></div>
        </div>
      </div>
    </div>

    <!-- ===== DOCUMENTS TAB ===== -->
    <div x-show="tab === 'documents'" x-cloak class="fade-in">
      <div class="bg-dark-800 rounded-xl border border-white/5 p-6">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-base font-semibold">Indexed Documents</h3>
          <div class="flex items-center gap-3">
            <select x-model="docCollection" @change="loadDocuments()"
              class="bg-dark-700 border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-accent-500">
              <template x-for="c in collectionList">
                <option :value="c.name" x-text="c.name"></option>
              </template>
            </select>
            <button @click="loadDocuments()" class="text-sm text-accent-500 hover:text-accent-400">Refresh</button>
          </div>
        </div>

        <div x-show="documents.length === 0" class="text-center py-12 text-gray-500">
          No documents indexed yet.
        </div>

        <div class="space-y-2">
          <template x-for="doc in documents" :key="doc.id">
            <div class="flex items-center justify-between bg-dark-700 rounded-lg px-4 py-3">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-white truncate" x-text="doc.filename"></p>
                <p class="text-xs text-gray-500 mt-0.5">
                  <span x-text="doc.chunk_count"></span> chunks &middot;
                  <span x-text="new Date(doc.created_at).toLocaleString('vi-VN')"></span>
                </p>
              </div>
              <div class="flex items-center gap-2 ml-4">
                <span class="text-xs text-gray-500 font-mono" x-text="doc.id.slice(0, 8) + '...'"></span>
                <button @click="deleteDocument(doc.id)" class="text-red-400 hover:text-red-300 text-sm px-2 py-1 rounded hover:bg-red-500/10 transition-colors">
                  Delete
                </button>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- ===== COLLECTIONS TAB ===== -->
    <div x-show="tab === 'collections'" x-cloak class="fade-in">
      <div class="bg-dark-800 rounded-xl border border-white/5 p-6">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-base font-semibold">Collections</h3>
          <button @click="loadCollections()" class="text-sm text-accent-500 hover:text-accent-400">Refresh</button>
        </div>

        <!-- Create collection -->
        <div class="flex gap-3 mb-4">
          <input type="text" x-model="newCollectionName" placeholder="New collection name..."
            class="flex-1 bg-dark-700 border border-white/10 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-accent-500" />
          <button @click="createCollection()" :disabled="!newCollectionName.trim()"
            class="bg-accent-500 hover:bg-accent-600 disabled:opacity-40 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
            Create
          </button>
        </div>

        <div class="space-y-2">
          <template x-for="c in collectionList" :key="c.name">
            <div class="flex items-center justify-between bg-dark-700 rounded-lg px-4 py-3">
              <div>
                <p class="text-sm font-medium text-white" x-text="c.name"></p>
                <p class="text-xs text-gray-500 mt-0.5">
                  <span x-text="c.document_count"></span> documents &middot;
                  <span x-text="c.chunk_count"></span> chunks
                </p>
              </div>
              <button @click="deleteCollection(c.name)" class="text-red-400 hover:text-red-300 text-sm px-2 py-1 rounded hover:bg-red-500/10 transition-colors"
                x-show="c.name !== 'documents'">
                Delete
              </button>
            </div>
          </template>
        </div>
      </div>
    </div>

  </main>

  <!-- Toast notification -->
  <div x-show="toast" x-transition class="fixed bottom-4 right-4 z-50 px-4 py-3 rounded-lg shadow-lg text-sm max-w-sm"
    :class="toastType === 'ok' ? 'bg-emerald-500/90 text-white' : 'bg-red-500/90 text-white'"
    x-text="toast"></div>

  <script>
    function app() {
      return {
        // State
        tab: 'search',
        healthy: false,
        toast: '', toastType: 'ok',

        // Search
        query: '', topK: 5, searchCollection: 'documents',
        searchResults: [], searchDone: false, searching: false,

        // Upload
        uploadQueue: [], uploadCollection: 'documents',
        uploading: false, uploadProgress: 0,
        dragOver: false,
        textTitle: '', textContent: '',
        indexingText: false, textResult: '', textResultOk: false,

        // Documents
        documents: [], docCollection: 'documents',

        // Collections
        collectionList: [{ name: 'documents', document_count: 0, chunk_count: 0 }],
        newCollectionName: '',

        async init() {
          await this.checkHealth();
          await this.loadCollections();
          setInterval(() => this.checkHealth(), 15000);
        },

        // --- API helpers ---
        async api(url, opts = {}) {
          try {
            const res = await fetch(url, opts);
            if (!res.ok) throw new Error(await res.text());
            return await res.json();
          } catch (e) {
            this.showToast(e.message, 'error');
            throw e;
          }
        },

        showToast(msg, type = 'ok') {
          this.toast = msg; this.toastType = type;
          setTimeout(() => this.toast = '', 3000);
        },

        // --- Health ---
        async checkHealth() {
          try {
            await this.api('/api/health');
            this.healthy = true;
          } catch { this.healthy = false; }
        },

        // --- Search ---
        async search() {
          if (!this.query.trim()) return;
          this.searching = true; this.searchDone = false; this.searchResults = [];
          try {
            const data = await this.api('/api/search', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ query: this.query, collection: this.searchCollection, top_k: this.topK })
            });
            this.searchResults = data.results;
            this.searchDone = true;
          } finally { this.searching = false; }
        },

        // --- Upload ---
        handleFileSelect(e) {
          for (const f of e.target.files) {
            this.uploadQueue.push({ file: f, name: f.name, status: 'pending', chunks: 0 });
          }
        },
        handleFileDrop(e) {
          for (const f of e.dataTransfer.files) {
            this.uploadQueue.push({ file: f, name: f.name, status: 'pending', chunks: 0 });
          }
        },
        async uploadFiles() {
          this.uploading = true; this.uploadProgress = 0;
          for (const item of this.uploadQueue) {
            if (item.status === 'done') { this.uploadProgress++; continue; }
            item.status = 'uploading';
            try {
              const fd = new FormData();
              fd.append('file', item.file);
              fd.append('collection', this.uploadCollection);
              const data = await this.api('/api/documents/upload', { method: 'POST', body: fd });
              item.status = 'done';
              item.chunks = data.chunk_count;
            } catch {
              item.status = 'error';
            }
            this.uploadProgress++;
          }
          this.uploading = false;
          this.showToast(`Uploaded ${this.uploadProgress} files`);
          this.loadCollections();
        },

        // --- Text Index ---
        async indexText() {
          this.indexingText = true; this.textResult = '';
          try {
            const fd = new FormData();
            fd.append('text', this.textContent);
            fd.append('title', this.textTitle || 'untitled');
            fd.append('collection', this.uploadCollection);
            const data = await this.api('/api/documents/text', { method: 'POST', body: fd });
            this.textResult = `Indexed ${data.chunk_count} chunks (${data.document_id.slice(0, 8)}...)`;
            this.textResultOk = true;
            this.textContent = ''; this.textTitle = '';
            this.loadCollections();
          } catch (e) {
            this.textResult = 'Error: ' + e.message;
            this.textResultOk = false;
          } finally { this.indexingText = false; }
        },

        // --- Documents ---
        async loadDocuments() {
          try {
            const data = await this.api(`/api/documents?collection=${this.docCollection}`);
            this.documents = data.documents;
          } catch {}
        },
        async deleteDocument(id) {
          if (!confirm('Delete this document?')) return;
          await this.api(`/api/documents/${id}?collection=${this.docCollection}`, { method: 'DELETE' });
          this.showToast('Document deleted');
          this.loadDocuments();
          this.loadCollections();
        },

        // --- Collections ---
        async loadCollections() {
          try {
            const data = await this.api('/api/collections');
            if (data.length > 0) this.collectionList = data;
          } catch {}
        },
        async createCollection() {
          if (!this.newCollectionName.trim()) return;
          await this.api('/api/collections', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: this.newCollectionName })
          });
          this.showToast(`Collection '${this.newCollectionName}' created`);
          this.newCollectionName = '';
          this.loadCollections();
        },
        async deleteCollection(name) {
          if (!confirm(`Delete collection "${name}" and ALL its data?`)) return;
          await this.api(`/api/collections/${name}`, { method: 'DELETE' });
          this.showToast(`Collection '${name}' deleted`);
          this.loadCollections();
        },
      };
    }
  </script>
</body>
</html>
